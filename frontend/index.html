<!DOCTYPE html>
<html>
<head>

<title>User Management</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:350px;
}

h2{
text-align:center;
color:#333;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2a5298;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="container">

<h2>Create User</h2>

<form id="form">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="file" name="photo">

<button type="submit">Submit</button>

</form>

</div>

<script>

document.getElementById("form").onsubmit = async (e)=>{

e.preventDefault()

const form = new FormData(e.target)

await fetch("http://192.168.0.101:8080/users",{
method:"POST",
body:form
})

alert("User created")

}

</script>

</body>
</html>
